<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Timer Pomodoro para gerenciar foco e pausas." />
  <title>Timer Pomodoro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Container principal -->
  <div id="pomodoro-app">

    <!-- Cabeçalho -->
    <header class="pomodoro-header">
      <h1 class="pomodoro-header__title">Timer Pomodoro</h1>
      <p class="pomodoro-header__subtitle">Foque. Descanse. Repita.</p>
    </header>

    <!-- Área do timer -->
    <section id="timer-card">

      <!-- Indicador do modo atual -->
      <span id="mode-badge" role="status" aria-live="polite">Foco</span>

      <!-- Exibição do tempo mm:ss -->
      <output id="timer-display" role="timer" aria-live="off">25:00</output>

      <!-- Botões de controle -->
      <div class="timer__controls">

        <button id="btn-start" class="btn" type="button">▶ Start</button>

        <button id="btn-pause" class="btn" type="button">⏸ Pause</button>

        <button id="btn-reset" class="btn" type="button">↺ Reset</button>

      </div>

    </section>

    <!-- Contador de pomodoros concluídos -->
    <div id="pomodoro-counter" role="status" aria-live="polite">

      <!-- Bolinhas visuais dos 4 ciclos do bloco atual -->
      <div class="pomodoro-counter__dots">
        <span class="pomodoro-counter__dot" data-dot-index="1"></span>
        <span class="pomodoro-counter__dot" data-dot-index="2"></span>
        <span class="pomodoro-counter__dot" data-dot-index="3"></span>
        <span class="pomodoro-counter__dot" data-dot-index="4"></span>
      </div>

      <p class="pomodoro-counter__label">
        Pomodoros concluídos:
        <strong id="pomodoro-count" class="pomodoro-counter__value">0</strong>
      </p>

    </div>

    <!-- Configurações -->
    <section id="settings-card">

      <h2 class="settings-card__title">Configurações</h2>

      <form id="settings-form" class="settings-form" novalidate>

        <div class="form-row">

          <!-- Tempo de foco -->
          <div class="form-group">
            <label class="form-group__label" for="input-focus-time">⏱ Foco</label>
            <<<<<<< Updated upstream <input id="input-focus-time" class="form-group__input" type="number"
              name="focus-time" min="1" max="60" value="25" placeholder="25" />
            <span class="form-group__suffix">minutos</span>
            =======
            <input id="input-focus-time" class="form-group__input" type="number" name="focus-time" min="1" max="3600"
              step="1" value="120" placeholder="300" />
            <span class="form-group__suffix">segundos</span>
            >>>>>>> Stashed changes
          </div>

          <!-- Tempo de pausa -->
          <div class="form-group">
            <label class="form-group__label" for="input-break-time">☕ Pausa</label>
            <<<<<<< Updated upstream <input id="input-break-time" class="form-group__input" type="number"
              name="break-time" min="1" max="30" value="5" placeholder="5" />
            <span class="form-group__suffix">minutos</span>
            =======
            <input id="input-break-time" class="form-group__input" type="number" name="break-time" min="1" max="1800"
              step="1" value="300" placeholder="300" />
            <span class="form-group__suffix">segundos</span>
            >>>>>>> Stashed changes
          </div>

        </div>

        <button id="btn-save" class="btn" type="submit">Salvar Configurações</button>

      </form>

    </section>

    <!-- Área de notificações -->
    <div id="notifications-area" role="alert" aria-live="assertive">
      <p id="notifications-placeholder" class="notifications-area__placeholder">
        As notificações aparecerão aqui…
      </p>
    </div>

    <!-- Rodapé -->
    <footer class="pomodoro-footer">
      <p class="pomodoro-footer__text">Técnica Pomodoro</p>
    </footer>

  </div>

  <!-- /#pomodoro-app -->

  <script src="script.js"></script>

</body>

</html>
