<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Timer Pomodoro para gerenciar foco e pausas." />
  <title>Timer Pomodoro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Container principal -->
  <!--
    JS: adicionar as classes .is-running | .is-paused | .is-break
    neste elemento para refletir o estado do timer.
  -->
  <div id="pomodoro-app">

    <!-- Cabeçalho -->
    <header class="pomodoro-header">
      <h1 class="pomodoro-header__title">Timer Pomodoro</h1>
      <p class="pomodoro-header__subtitle">Foque. Descanse. Repita.</p>
    </header>

    <!-- Área do timer -->
    <section id="timer-card">

      <!-- Indicador do modo atual -->
      <!--
        JS: trocar o texto para "Pausa" e adicionar
        a classe .timer__mode-badge--break quando entrar no modo pausa.
      -->
      <span id="mode-badge" role="status" aria-live="polite">Foco</span>

      <!-- Exibição do tempo mm:ss -->
      <!--
        JS: atualizar o textContent com o tempo no formato mm:ss.
      -->
      <output id="timer-display" role="timer" aria-live="off">25:00</output>

      <!-- Botões de controle -->
      <div class="timer__controls">

        <!--
          JS: iniciar a contagem regressiva ao clicar.
          Desabilitar enquanto o timer estiver rodando.
        -->
        <button id="btn-start" class="btn" type="button">▶ Start</button>

        <!--
          JS: pausar a contagem ao clicar.
          Desabilitar quando o timer não estiver rodando.
        -->
        <button id="btn-pause" class="btn" type="button">⏸ Pause</button>

        <!--
          JS: reiniciar o timer ao clicar.
          Volta para o tempo de foco configurado.
        -->
        <button id="btn-reset" class="btn" type="button">↺ Reset</button>

      </div>

    </section>

    <!-- Contador de pomodoros concluídos -->
    <!--
      JS: incrementar o valor de #pomodoro-count ao completar um ciclo.
      Preencher os dots com .pomodoro-counter__dot--filled conforme o ciclo avança.
    -->
    <div id="pomodoro-counter" role="status" aria-live="polite">

      <!-- Bolinhas visuais dos 4 ciclos do bloco atual -->
      <div class="pomodoro-counter__dots">
        <!-- JS: adicionar .pomodoro-counter__dot--filled conforme ciclos são completados -->
        <span class="pomodoro-counter__dot" data-dot-index="1"></span>
        <span class="pomodoro-counter__dot" data-dot-index="2"></span>
        <span class="pomodoro-counter__dot" data-dot-index="3"></span>
        <span class="pomodoro-counter__dot" data-dot-index="4"></span>
      </div>

      <p class="pomodoro-counter__label">
        Pomodoros concluídos:
        <strong id="pomodoro-count" class="pomodoro-counter__value">0</strong>
      </p>

    </div>

    <!-- Configurações -->
    <!--
      JS: ao submeter o formulário, ler #input-focus-time e #input-break-time,
      validar e aplicar os valores no timer.
    -->
    <section id="settings-card">

      <h2 class="settings-card__title">Configurações</h2>

      <form id="settings-form" class="settings-form" novalidate>

        <div class="form-row">

          <!-- Tempo de foco -->
          <div class="form-group">
            <label class="form-group__label" for="input-focus-time">⏱ Foco</label>

          <div class="form-group">

        </div>

        <!--
          JS: ao clicar, salvar os valores dos campos acima e atualizar o timer.
          Exibir uma notificação em #notifications-area confirmando.
        -->
        <button id="btn-save" class="btn" type="submit">Salvar Configurações</button>

      </form>

    </section>

    <!-- Área de notificações -->
    <!--
      JS: inserir elementos .notification aqui dinamicamente.
      Tipos: .notification--success | .notification--info | .notification--warning
      Remover automaticamente após alguns segundos.
      Ocultar #notifications-placeholder quando houver notificações.
    -->
    <div id="notifications-area" role="alert" aria-live="assertive">
      <p id="notifications-placeholder" class="notifications-area__placeholder">
        As notificações aparecerão aqui…
      </p>
    </div>

    <!-- Rodapé -->
    <footer class="pomodoro-footer">
      <p class="pomodoro-footer__text">Técnica Pomodoro</p>
    </footer>

  </div>
  
  <!-- /#pomodoro-app -->

  <!--
    IDs disponíveis para o JavaScript:
      #pomodoro-app         → container principal (recebe classes de estado)
      #mode-badge           → indicador do modo (Foco / Pausa)
      #timer-display        → exibição do tempo mm:ss
      #btn-start            → botão Start
      #btn-pause            → botão Pause
      #btn-reset            → botão Reset
      #pomodoro-count       → número de pomodoros concluídos
      [data-dot-index]      → bolinhas de ciclo (1 a 4)
      #settings-form        → formulário de configurações
      #input-focus-time     → campo do tempo de foco (minutos)
      #input-break-time     → campo do tempo de pausa (minutos)
      #btn-save             → botão salvar configurações
      #notifications-area   → área de notificações
      #notifications-placeholder → texto padrão quando vazio

    Classes CSS de estado (no #pomodoro-app):
      .is-running   → timer em contagem
      .is-paused    → timer pausado
      .is-break     → modo pausa/descanso

    Classes de notificação (no .notification):
      .notification--success
      .notification--info
      .notification--warning
  -->
  <script src="script.js"></script>

</body>
</html>
